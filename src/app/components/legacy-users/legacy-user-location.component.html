<div [formGroup]="locationGroup" class="location-fields">
	<h4 class="mt-0 mb-1">Localisation</h4>

	<label>
		Adresse
		<input pInputText formControlName="address" placeholder="123 rue de la Paix" class="w-full" />
		@if (locationGroup.get('address')?.invalid && locationGroup.get('address')?.touched) {
			<small class="p-error">Adresse requise (min. 5 caractères)</small>
		}
	</label>

	<label>
		Pays
		<p-select
			formControlName="country"
			[options]="countryOptions"
			optionLabel="label"
			optionValue="value"
			placeholder="Choisir un pays"
			styleClass="w-full"
		/>
		@if (locationGroup.get('country')?.invalid && locationGroup.get('country')?.touched) {
			<small class="p-error">Pays requis</small>
		}
	</label>
</div>
