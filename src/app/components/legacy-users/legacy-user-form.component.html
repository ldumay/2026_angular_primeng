<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
	<h3>{{ isEditMode ? 'Modifier' : 'Ajouter' }} un utilisateur</h3>

	<label>
		Pseudo
		<input formControlName="pseudo" placeholder="johndoe" />
		@if (form.get('pseudo')?.invalid && form.get('pseudo')?.touched) {
			<span class="error">Pseudo requis (min. 3 caractères)</span>
		}
	</label>

	<label>
		Email
		<input formControlName="email" type="email" placeholder="john@example.com" />
		@if (form.get('email')?.invalid && form.get('email')?.touched) {
			<span class="error">Email invalide</span>
		}
	</label>

	<app-legacy-user-location />

	<div class="actions">
		<button type="submit">{{ isEditMode ? 'Mettre à jour' : 'Ajouter' }}</button>
		@if (isEditMode) {
			<button type="button" (click)="form.reset()">Annuler</button>
		}
	</div>

	<details>
		<summary>Etat du formulaire</summary>
		<pre>{{ form.value | json }}</pre>
		<small>Valid: {{ form.valid }} | Dirty: {{ form.dirty }}</small>
	</details>
</form>
