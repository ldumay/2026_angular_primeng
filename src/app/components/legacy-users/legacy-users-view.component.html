<div class="view-users">
	<h2 class="mt-0 mb-3">Gestion des utilisateurs importée</h2>

	<div class="grid">
		<div class="col-12 lg:col-4">
			<p-card header="Recherche et liste">
				<app-legacy-user-search [users]="users()" (userSelect)="onUserSelect($event)" />

				<app-legacy-user-list
					[users]="users()"
					[selectedUserId]="selectedUserId()"
					(userSelect)="onUserSelect($event)"
				/>
			</p-card>
		</div>

		<div class="col-12 lg:col-8">
			<p-card [header]="selectedUserId() === null ? 'Création utilisateur' : 'Édition utilisateur'">
				@if (users().length === 0 && selectedUserId() === null) {
					<p class="hint">Ajoutez ou sélectionnez un utilisateur.</p>
				}

				<app-legacy-user-form [selectedUser]="selectedUser()" (userSubmit)="onUserSubmit($event)" />
			</p-card>
		</div>
	</div>
</div>
