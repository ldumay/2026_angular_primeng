<div class="user-list">
	<h3>Utilisateurs ({{ users.length }})</h3>

	@if (users.length === 0) {
		<p class="empty">Aucun utilisateur. Ajoutez-en un.</p>
	} @for (user of users; track trackById($index, user)) {
		<div
			class="user-card"
			[class.selected]="user.id === selectedUserId"
			(click)="onSelect(user)"
			role="button"
			[attr.aria-pressed]="user.id === selectedUserId"
		>
			<strong>{{ user.pseudo }}</strong>
			<span>{{ user.email }}</span>
			<small>{{ user.location.country }} - {{ user.location.address }}</small>
		</div>
	}
</div>
