<p-select
	class="profession-select"
	[options]="(professions$ | async) ?? []"
	[ngModel]="value"
	[disabled]="disabled"
	optionLabel="label"
	optionValue="code"
	placeholder="Selectionner une profession"
	appendTo="body"
	(onChange)="onSelectionChange($event)"
	(onBlur)="handleBlur()"
	ariaLabel="Profession"
/>
