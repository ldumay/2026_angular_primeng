<div class="user-autocomplete-demo">
	<label class="mb-2 font-semibold">Utilisateurs legacy</label>

	<p-autocomplete
		[formControl]="innerControl"
		[suggestions]="suggestions()"
		(completeMethod)="search($event)"
		optionLabel="pseudo"
		placeholder="Rechercher par pseudo ou email..."
		[multiple]="true"
		fluid
	>
		<ng-template #item let-user>
			<div class="suggestion-item">
				<strong>{{ user.pseudo }}</strong>
				<small>{{ user.email }}</small>
				<small class="text-color-secondary">{{ user.location.country }} — {{ user.location.address }}</small>
			</div>
		</ng-template>
	</p-autocomplete>

	<div class="flex gap-2 mt-2">
		<p-button
			label="Ajout 2 users random"
			icon="pi pi-plus"
			(onClick)="addTwoRandomUsers()"
			severity="info"
			[outlined]="true"
			[disabled]="isDisabled"
			size="small"
		/>
		<p-button
			label="Réinitialiser"
			icon="pi pi-times"
			(onClick)="clearAll()"
			severity="secondary"
			[outlined]="true"
			[disabled]="isDisabled"
			size="small"
		/>
	</div>
</div>
