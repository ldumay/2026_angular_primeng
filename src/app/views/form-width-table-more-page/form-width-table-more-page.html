<div class="w-full p-4">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-4">
            <label class="block mb-1 font-semibold" for="name">Nom de la commande</label>
            <input id="name" pInputText formControlName="name" class="w-full" />
        </div>

        <items-table formControlName="items" />

        <div class="mt-4">
            <p-button type="submit" label="Soumettre" />
        </div>
    </form>
</div>
