<p-toolbar>
	<ng-template #start>
		<strong class="text-lg">Prime Users Manager</strong>
	</ng-template>

	<ng-template #end>
		<div class="flex flex-wrap gap-2 justify-content-end">
			<a pButton routerLink="/" label="Accueil" severity="secondary"></a>
			<a pButton routerLink="/demo-form" label="Demo Form" severity="contrast"></a>
			<a pButton routerLink="/demo-table" label="Demo Table" severity="help"></a>
			<a pButton routerLink="/demo-split-button" label="Demo Split Button" severity="warn"></a>
			<a pButton routerLink="/users" label="Utilisateurs"></a>
			<a pButton routerLink="/import-users" label="Import Users" severity="info"></a>
			<a pButton routerLink="/autocomplete-button-sync" label="Autocomplete & Button" severity="success"></a>
			<a pButton routerLink="/lazy-table" label="Lazy table" severity="contrast"></a>
			<a pButton routerLink="/form-width-table" label="Form width table" severity="help"></a>
			<a pButton routerLink="form-width-table-more" label="Form width table (more)" severity="warn"></a>
		</div>
	</ng-template>
</p-toolbar>

<main class="app-main">
	<router-outlet />
</main>
